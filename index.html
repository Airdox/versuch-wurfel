<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AIRDOX — Berlin Underground Techno DJ & Producer. Ultimate Coherence Edition.">
    <title>AIRDOX — Berlin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <!-- CURSOR -->
    <div id="cur"></div>

    <!-- LOADER -->
    <div id="loader">
        <div class="loader-content">
            <div class="loader-name">AIRDOX</div>
            <div class="loader-bar-wrap"><div class="loader-bar" id="loaderBar"></div></div>
        </div>
    </div>

    <!-- BACKGROUND VISUALIZER -->
    <canvas id="bg-visualizer"></canvas>

    <!-- GLOBAL VIGNETTE -->
    <div id="global-vignette"></div>

    <!-- HERO SECTION (Sektor: TOP) -->
    <div class="hero-section" id="heroTitle">
        <div class="logo-wrap">
            <svg class="snake-logo" viewBox="0 0 850 140">
                <defs>
                    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#ff00aa;stop-opacity:1" />
                    </linearGradient>
                </defs>
                <text x="50%" y="100" text-anchor="middle" class="logo-base">AIRDOX</text>
                <text x="50%" y="100" text-anchor="middle" class="logo-snake">AIRDOX</text>
            </svg>
        </div>
        <div class="hero-subtext">BERLIN UNDERGROUND TECHNO ARCHITECTURE</div>
    </div>

    <!-- 3D SCENE (Sektor: CENTER) -->
    <main id="scene-container"></main>

    <!-- UI HUD (Sektor: BOTTOM) -->
    <div id="ui-layer">
        <div class="face-dots" id="faceDots">
            <button class="face-dot active" data-face="0"></button>
            <button class="face-dot" data-face="1"></button>
            <button class="face-dot" data-face="2"></button>
            <button class="face-dot" data-face="3"></button>
            <button class="face-dot" data-face="4"></button>
            <button class="face-dot" data-face="5"></button>
        </div>
        
        <div class="stats-label" id="statsLabel">AIRDOX // PLAYS: 0</div>

        <div class="cube-controls">
            <button class="cc-btn" id="prevBtn">PREV</button>
            <button class="cc-face-name" id="faceName">IDENTITY</button>
            <button class="cc-btn" id="nextBtn">NEXT</button>
        </div>
    </div>

    <nav>
        <button class="hamburger" id="hamburgerBtn">
            <span></span><span></span><span></span>
        </button>
    </nav>

    <div class="nav-overlay" id="navOverlay">
        <button data-face="0" class="active">Identity</button>
        <button data-face="1">About</button>
        <button data-face="2">Live Sets</button>
        <button data-face="3">Studio</button>
        <button data-face="4">Social</button>
        <button data-face="5">Booking</button>
    </div>

    <script type="module" src="./main.js"></script>
</body>
</html>
